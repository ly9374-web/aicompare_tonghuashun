<div id="app-shell">
  <div class="canvas-topbar">
    <div class="title-group">
      <strong id="map-title"></strong>
      <span id="node-count"></span>
    </div>
    <div class="toolbar-hint">单击编辑，双击进入子节点，Tab 子节点，Enter 同级</div>
    <div id="save-state">已保存</div>
  </div>

  <div id="viewport">
    <div class="layer-nav" aria-label="层级导航">
      <button id="layer-back-button" type="button" aria-label="返回父节点">←</button>
      <strong id="layer-title">顶层节点</strong>
    </div>
    <div id="canvas-world">
      <div id="canvas-content">
        <svg id="edges-layer"></svg>
        <div id="nodes-layer"></div>
        <svg id="annotation-layer"></svg>
      </div>
    </div>
  </div>

  <div class="side-toolbar" aria-label="画布工具栏">
    <button id="upload-image-button" type="button">
      <span class="tool-icon">IMG</span>
      <span>上传图片</span>
    </button>
    <input id="image-upload-input" type="file" accept="image/*" multiple />
    <button id="red-highlighter-button" type="button">
      <span class="tool-icon red-tool">RED</span>
      <span>红色高亮</span>
    </button>
    <button id="green-highlighter-button" type="button">
      <span class="tool-icon green-tool">GRN</span>
      <span>绿色高亮</span>
    </button>
    <input id="brush-size-input" type="hidden" value="16" />
    <button id="eraser-button" type="button">
      <span class="tool-icon erase-tool">ERS</span>
      <span>去除高亮</span>
    </button>
    <button id="comment-button" type="button">
      <span class="tool-icon comment-tool">COM</span>
      <span>评语</span>
    </button>
    <button id="compare-button" type="button">
      <span class="tool-icon compare-tool">CMP</span>
      <span>对比</span>
    </button>
    <button id="auto-layout-button" type="button">
      <span class="tool-icon">LOC</span>
      <span>找到节点</span>
    </button>
  </div>

  <div id="context-menu" role="menu">
    <button id="context-menu-action" type="button">添加王冠</button>
    __AI_ANALYSIS_MENU_BUTTON__
    <button id="context-menu-move-up-action" type="button">移到上一级</button>
    <button id="context-menu-delete-action" type="button">删除节点</button>
    <button id="context-menu-collapse-action" type="button">不展示后续节点</button>
  </div>
</div>

<style>
__CANVAS_CSS__
</style>

<script>
__CANVAS_JS__
</script>
